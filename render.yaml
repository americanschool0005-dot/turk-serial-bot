services:
  - type: worker
    name: turk-serial-bot
    runtime: docker
    repo: https://github.com/americanschool0005-dot/turk-serial-bot
    branch: main
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: turk-serial-db
          property: connectionString

databases:
  - name: turk-serial-db
    databaseName: turk_serial_bot
    user: turk_bot
    plan: free
